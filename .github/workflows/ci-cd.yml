name: CI/CD Docker deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: mamanestnourish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source data
        run: npm run validate:sources

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t mamanestnourish:${{ github.sha }} .

  deploy-aws:
    name: Deploy Docker app to AWS
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Validate AWS deployment secrets
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          test -n "$AWS_HOST" || (echo "AWS_HOST secret is required." && exit 1)
          test -n "$AWS_USER" || (echo "AWS_USER secret is required." && exit 1)
          test -n "$AWS_SSH_KEY" || (echo "AWS_SSH_KEY secret is required." && exit 1)

      - name: Prepare SSH key
        env:
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AWS_SSH_KEY" > ~/.ssh/mamanest_aws_key
          chmod 600 ~/.ssh/mamanest_aws_key

      - name: Deploy Docker app to AWS
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_SSH_KEY_PATH: /home/runner/.ssh/mamanest_aws_key
        run: bash scripts/deployAwsDocker.sh
