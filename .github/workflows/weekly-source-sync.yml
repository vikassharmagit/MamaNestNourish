name: Weekly source sync

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch official source updates
        run: npm run update:sources

      - name: Validate source data
        run: npm run validate:sources

      - name: Run tests
        run: npm test

      - name: Commit source updates
        run: |
          if git diff --quiet; then
            echo "No source updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/sources.json data/pending-updates.json
          git commit -m "Update official pregnancy source metadata"
          git push

      - name: Prepare SSH key
        if: ${{ secrets.AWS_HOST != '' && secrets.AWS_USER != '' && secrets.AWS_SSH_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/mamanest_aws_key
          chmod 600 ~/.ssh/mamanest_aws_key

      - name: Deploy Docker app to AWS
        if: ${{ secrets.AWS_HOST != '' && secrets.AWS_USER != '' && secrets.AWS_SSH_KEY != '' }}
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_SSH_KEY_PATH: /home/runner/.ssh/mamanest_aws_key
        run: bash scripts/deployAwsDocker.sh
